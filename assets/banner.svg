<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bgBlastradius" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accBlastradius" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <filter id="glowBlastradius" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="gridBlastradius" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="rgBlastradius" cx="85%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#0a0f1e;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bgBlastradius)"/>
  <rect width="1280" height="320" fill="url(#gridBlastradius)" opacity="0.4"/>
  <rect width="1280" height="320" fill="url(#rgBlastradius)"/>
  <rect x="0" y="0" width="1280" height="2" fill="url(#accBlastradius)" opacity="0.7"/>
  <rect x="0" y="0" width="4" height="320" fill="url(#accBlastradius)"/>

  <!-- Logo mark: a change/deployment at the center radiating an impact radius -->
  <g transform="translate(64, 112)" filter="url(#glowBlastradius)">
    <rect width="96" height="96" rx="16" fill="#f97316" opacity="0.85"/>
    <g transform="translate(48, 48)">
      <circle r="30" fill="none" stroke="#ffffff" stroke-width="1.6" opacity="0.35"/>
      <circle r="19" fill="none" stroke="#ffffff" stroke-width="1.8" opacity="0.6"/>
      <circle r="6" fill="#ffffff"/>
    </g>
  </g>

  <text x="184" y="158" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="62" font-weight="700" fill="#f1f5f9" letter-spacing="-2">
    Blast<tspan fill="url(#accBlastradius)">radius</tspan>
  </text>

  <text x="186" y="198" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="17" font-weight="400" fill="#64748b" letter-spacing="0.2">
    Deployment audit trail &amp; change-risk tracking  ·  Spring Boot 3  ·  React  ·  PostgreSQL
  </text>

  <line x1="184" y1="218" x2="820" y2="218" stroke="#1e293b" stroke-width="1"/>

  <g transform="translate(184, 236)">
    <rect width="118" height="34" rx="6" fill="#0f172a" stroke="#3f2a1e" stroke-width="1"/>
    <text x="59" y="13" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="9" fill="#475569" text-anchor="middle" letter-spacing="1" font-weight="600">AUDIT EVENTS</text>
    <text x="59" y="27" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="11" fill="#fb923c" text-anchor="middle" font-weight="600">queryable</text>
  </g>
  <g transform="translate(314, 236)">
    <rect width="118" height="34" rx="6" fill="#0f172a" stroke="#3f2a1e" stroke-width="1"/>
    <text x="59" y="13" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="9" fill="#475569" text-anchor="middle" letter-spacing="1" font-weight="600">RISK SCORING</text>
    <text x="59" y="27" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="11" fill="#fb923c" text-anchor="middle" font-weight="600">per deployment</text>
  </g>
  <g transform="translate(444, 236)">
    <rect width="118" height="34" rx="6" fill="#0f172a" stroke="#3f2a1e" stroke-width="1"/>
    <text x="59" y="13" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="9" fill="#475569" text-anchor="middle" letter-spacing="1" font-weight="600">COMPLIANCE</text>
    <text x="59" y="27" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="11" fill="#fb923c" text-anchor="middle" font-weight="600">CSV export</text>
  </g>
  <g transform="translate(574, 236)">
    <rect width="118" height="34" rx="6" fill="#0f172a" stroke="#3f2a1e" stroke-width="1"/>
    <text x="59" y="13" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="9" fill="#475569" text-anchor="middle" letter-spacing="1" font-weight="600">JAVA 17</text>
    <text x="59" y="27" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="11" fill="#fb923c" text-anchor="middle" font-weight="600">Spring Boot 3</text>
  </g>
</svg>
