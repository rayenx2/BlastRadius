# Server Configuration
server.port=8051
server.servlet.context-path=/audittrail

# Application Name
spring.application.name=AuditTrail

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5051/audittrail_db
spring.datasource.username=audittrail_user
spring.datasource.password=AuditTrail123!
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Configuration
security.jwt.secret=AuditTrailSecretKeyForJWTAuthentication2024@#$%SuperSecureKeyWithEnoughBitsForHS512Algorithm
security.jwt.expiration=86400000

# Swagger/OpenAPI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# File Upload Configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Logging
logging.level.root=INFO
logging.level.com.audittrail=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
